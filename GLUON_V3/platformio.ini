; ==========================================================================
;  GLUON V3 — Decentralized Dataflow Mesh Nodes
;  Multi-board support: build for different hardware targets.
;  Usage:
;    pio run                       # builds default (XIAO ESP32S3)
;    pio run -e xiao_esp32s3       # builds for Seeedstudio XIAO ESP32S3
;    pio run -e heltec_v3          # builds for Heltec WiFi LoRa 32 V3/V4
; ==========================================================================

; --- Shared settings for all boards ---
[env]
platform = espressif32
framework = arduino
board_build.filesystem = littlefs
monitor_speed = 115200

lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    olikraus/U8g2@^2.35.0
    Arduino-IRremote/IRremote@^4.4.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17
    -mtext-section-literals
build_unflags = -std=gnu++11

upload_speed = 921600

; ==========================================================================
;  Board: Seeedstudio XIAO ESP32S3 + Wio-SX1262 (external LoRa module)
;
;  - Smallest form factor, cheapest ($9.90 with LoRa)
;  - No built-in display (use XIAO Expansion Board for OLED)
;  - LoRa runs Meshtastic independently, connected via Serial1
;  - Grove connector ecosystem via Expansion Board
; ==========================================================================
[env:xiao_esp32s3]
board = seeed_xiao_esp32s3
board_build.partitions = default_8MB.csv
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DGLUON_BOARD_XIAO_ESP32S3

; ==========================================================================
;  Board: Heltec WiFi LoRa 32 V3 / V4
;
;  - All-in-one: ESP32-S3 + SX1262 + 0.96" OLED on a single board
;  - V4: 28dBm TX power, 16MB Flash, 2MB PSRAM, solar input, GNSS header
;  - V3/V4 are pin-compatible (same PlatformIO board target)
;  - Meshtastic runs on THIS chip (native, not sidecar)
;  - More user-accessible GPIO pins than XIAO
; ==========================================================================
[env:heltec_v3]
board = heltec_wifi_lora_32_V3
board_build.partitions = default_8MB.csv
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DGLUON_BOARD_HELTEC_V3
